<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>

      <style>
            .inc,
            .dec {
                  background-color: #fefefe;
                  color: crimson;
                  font-size: 20px;
                  margin-right: 10px;
                  border-radius: 50px;
                  border: 1px solid red;
                  height: 40px;
                  width: 40px;
            }
      </style>
</head>

<body>
      <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
            <h1 id="counter" style="font-size: 48px; margin: 20px;">0</h1>
            <button class="dec">-</button>
            <button class="inc">+</button>
      </div>


      <form method="get" style="padding: 20px" id="myForm">
            <h3 style="color: navy; font-size: 2rem;">Login</h3>
            <input type="text" name="username" id="username"> <p id="user_error" style="color: red; font-size:small;"></p><br /> 

            <input type="password" name="user_password" id="user_password"> <p id="pass_error" style="color: red; font-size:small;"></p><br />
            <button type="submit" name="submit">Login</button>
      </form>
</body>

<script>
const form = document.getElementById('myForm');
const user_error = document.getElementById('user_error');
const pass_error = document.getElementById('pass_error');

      form.addEventListener('submit', (e) => {
            e.preventDefault();

            let hasError = false;

            user_error.textContent = "";
            pass_error.textContent = "";

            if (!username.value.trim()) {
                  user_error.textContent = "Username is required";
                  hasError = true;
            }

            if (!user_password.value) {
                  pass_error.textContent = "Password is required";
                  hasError = true;
            } else if (user_password.value.length < 8) {
                  pass_error.textContent = "Password must be at least 8 characters long";
                  hasError = true;
            }

            if (hasError) return;

            console.log("Form submitted successfully");
      });


      let count = 0;
      const counterDisplay = document.getElementById("counter");
      const incBtn = document.querySelector(".inc");
      const decBtn = document.querySelector(".dec");

      incBtn.addEventListener("click", () => {
            count++; 
            counterDisplay.textContent = count;

            if(count < 0){
                  counterDisplay.style.color = "red";
            } else {
                  counterDisplay.style.color = "black";
            }
      });

      decBtn.addEventListener("click", () => {
            count--;
            counterDisplay.textContent = count;

            if(count < 0){
                  counterDisplay.style.color = "red";
            } else {
                  counterDisplay.style.color = "black";
            }
      });
</script>

</html>
